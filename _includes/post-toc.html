<div class="container project-container">
  <div class="project-description-container">
    <div class="container-inner-wrapper row" style="transform: translateY(0px);">
      <div class="small-12 medium-6 large-5 column" id="toc-scroll">
        <div class="text-content content-left">
          <h2>{{page.categories}}</h2>
          <h1>{{page.title}}</h1>
          {% include navbar_social-media.html %}
          <!-- <div style="height: 3px; background: #515151; position: absolute; width: 10%;"></div> -->
          <div class="excerpt" style="padding-top: 30px">
            <div class="col-sm-3">
              <div id="js-toc" data-toggle="toc" class="js-toc"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container-inner-wrapper photos-container row">
    <div class="small-12 medium-6 large-7 medium-offset-6 large-offset-5 column">
      <div class="gallery-wrapper" data-pswp-uid="1">
        <div class="image-wrapper text-content js-toc-content" id="post .js-toc-content">
          {{page.content}}
        </div>
      </div>
    </div>
  </div>
</div>
