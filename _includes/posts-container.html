<div class="container row">
  <div class="container-inner-wrapper">
    <div class="projects-grid" style="position: relative; height: 4162.5px;">

      {% for post in site.posts %} {% if post.published %}

      <a href="{{site.url}}{{post.url}}" class="project-item {{post.categories}} {{post.tags | array_to_sentence_string | remove: "," | remove: "and "}}" title="{{ post.title }}">
        <div class="inner-wrapper">
          {% if post.cover %}
          <img class="lazy loaded" title="" alt="{{post.title}}" src="{{ site.url }}/{{ post.cover }}" style="display: block;"> {% else %}
          <div class="lazy loaded" style="background-color:#f8f8ff;width:100%;height:85%;border:1px solid #000;"></div>
          {% endif %}
          <span class="project-name {% if post.class == 'vertical' %}vertical-image {% endif %}">{{post.title}}<p style="font-weight:300">{{post.date | date: "%-d %B %Y"}}</p></span>
        </div>
      </a>
      {% endif %} {% endfor %} {% for page in site.pages %} {% if page.layout == 'navbar-sidebar-posts-archive' %}
      <a href="{{site.url}}{{page.url}}" class="project-item archives-link" style="position: absolute; left: 285px; top: 3993px;">
        <div class="inner-wrapper"></div>
      </a>
      {% endif %} {% endfor %}
    </div>
  </div>
</div>
